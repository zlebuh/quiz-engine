<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Panel</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/custom.css" />
  <style>
    .host-bar {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(12,14,22,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; gap: 14px; z-index: 100;
    }
    .host-bar h1 { font-size: 1rem; margin: 0; font-weight: 700; letter-spacing: -.01em; }
    .phase-label {
      font-size: .7rem; font-weight: 700;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid rgba(240,180,41,0.22);
      padding: 3px 11px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .07em;
    }

    .player-status-bar {
      position: fixed; top: 68px; left: 0; right: 0;
      background: rgba(12,14,22,0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 7px 24px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; z-index: 99;
    }
    .player-status-bar .label {
      font-size: .7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      font-weight: 600; margin-right: 4px;
    }
    .ps-chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .78rem; font-weight: 500;
      padding: 3px 11px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .ps-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ps-chip.online .dot  { background: var(--green); box-shadow: 0 0 5px rgba(34,197,94,0.6); }
    .ps-chip.offline .dot { background: var(--muted); }
    .ps-chip.offline { opacity: .45; }

    body { padding-top: 116px; }

    .correct-toggle { cursor: pointer; user-select: none; }

  </style>
</head>
<body>
  <div class="host-bar">
    <div>
      <h1 id="host-bar-title">Quiz</h1>
      <div id="host-bar-subtitle" style="font-size:.72rem;color:var(--muted);margin-top:1px;letter-spacing:.02em"></div>
    </div>
    <span class="phase-label" id="phase-label">lobby</span>
  </div>
  <div class="player-status-bar hidden">
    <span class="label">Players</span>
    <div id="player-status-chips"></div>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="card center">
    <h2>Lobby</h2>
    <div class="qr-box">
      <img id="qr-img" src="/qr" alt="QR Code" />
    </div>
    <hr>
    <h3>Players</h3>
    <div id="lobby-player-chips" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:28px">
      <span style="color:var(--muted);font-size:.88rem">None yet…</span>
    </div>
    <hr>
    <div class="flex-row">
      <button class="btn-green" id="btn-start-game">Start Quiz</button>
    </div>
  </div>

  <!-- QUESTION CONTROL -->
  <div id="screen-question" class="card hidden">
    <span class="section-badge" id="h-section-badge"></span>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:4px" id="h-progress"></p>
    <p class="question-text" id="h-qtext"></p>
    <hr>
    <div class="flex-row">
      <button class="btn-primary" id="btn-start-timer">▶ Start Timer</button>
      <button class="btn-danger hidden" id="btn-stop-timer">⏹ Stop Timer</button>
    </div>

    <p id="h-answer-count" class="hidden" style="text-align:center;font-size:.9rem;color:var(--muted);margin-top:4px"></p>

    <div class="timer-ring hidden" id="h-timer-ring">
      <svg viewBox="0 0 100 100" width="110" height="110">
        <circle class="track" cx="50" cy="50" r="45"/>
        <circle class="progress" id="h-timer-arc" cx="50" cy="50" r="45"/>
      </svg>
      <div class="timer-number" id="h-timer-number">30</div>
    </div>

    <div id="h-after-timer" class="hidden mt">
      <p class="status-msg" style="color:var(--gold)">Timer ended. Players' answers locked.</p>
      <div class="flex-row mt">
        <button class="btn-ghost" id="btn-next-question">Next Question →</button>
      </div>
    </div>
  </div>

  <!-- REVIEW -->
  <div id="screen-review" class="card hidden">
    <h2 id="review-title">Review Answers</h2>

    <h3>Questions &amp; Correct Answers</h3>
    <div style="overflow-x:auto;margin-bottom:4px">
      <table class="review-table" id="review-questions-table">
        <thead><tr><th style="width:40px">#</th><th>Question</th><th>Correct Answer</th></tr></thead>
        <tbody id="review-questions-body"></tbody>
      </table>
    </div>

    <hr>

    <h3>Player Answers</h3>
    <p style="color:var(--muted);font-size:.82rem;margin-bottom:12px">Use ✓ / ✗ to override the automatic grading.</p>
    <div style="overflow-x:auto">
      <table class="review-table" id="review-table">
        <thead id="review-head"></thead>
        <tbody id="review-body"></tbody>
      </table>
    </div>

    <hr>
    <div class="flex-row">
      <button class="btn-green" id="btn-confirm-review">✓ Confirm &amp; Show Standings</button>
    </div>
  </div>

  <!-- STANDINGS (host view) -->
  <div id="screen-standings" class="card hidden">
    <h2 id="h-standings-title">Standings</h2>
    <table class="standings-table">
      <thead><tr><th class="rank">#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="h-standings-body"></tbody>
    </table>
    <hr>
    <div class="flex-row">
      <button class="btn-green" id="btn-next-section">Next Section →</button>
    </div>
  </div>

  <!-- GAME OVER (host view) -->
  <div id="screen-gameover" class="card hidden">
    <div class="fireworks">🏆🎉</div>
    <h2 class="center" id="gameover-title">Quiz Complete — Final Standings</h2>
    <table class="standings-table">
      <thead><tr><th class="rank">#</th><th>Player</th><th>Score</th></tr></thead>
      <tbody id="h-gameover-body"></tbody>
    </table>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    fetch('/api/theme').then(r => r.json()).then(t => {
      document.title = t.title + ' — Host';
      document.getElementById('host-bar-title').textContent = t.title;
      document.getElementById('host-bar-subtitle').textContent = t.subtitle;
      const go = document.getElementById('gameover-title');
      if (go) go.textContent = t.title + ' — Final Standings';
    });
  </script>
  <script src="/host.js"></script>
</body>
</html>
